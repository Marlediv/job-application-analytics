name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile
        run: python -m compileall src dashboard

      - name: KPI flag tests
        run: python tests/test_kpi_flags.py

      - name: Rate by source tests
        run: python tests/test_rate_by_source.py

      - name: Quality tests
        run: python tests/test_quality.py
